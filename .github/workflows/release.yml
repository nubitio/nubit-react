name: Release

# Lockstep release flow (no changelog files — notes live in GitHub Releases):
#   1. node scripts/set-version.mjs X.Y.Z && commit
#   2. git tag vX.Y.Z && git push --tags
#   3. This workflow validates, publishes all packages to npm with provenance,
#      and creates a GitHub Release with auto-generated notes.
#
# Requires the NPM_TOKEN repository secret (npm automation token with publish
# rights on the @nubit scope).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/core/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package version $PKG_VERSION."
            echo "Run: node scripts/set-version.mjs $TAG_VERSION  (and commit) before tagging."
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Validate publish artifacts (publint + attw)
        run: pnpm validate:packages

      - name: Publish to npm (lockstep, dependency order)
        run: pnpm publish -r --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Create GitHub Release with auto-generated notes
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
